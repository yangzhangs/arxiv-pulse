<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title x-text="t.adminTitle || '管理后台'">管理后台 - ArxivPulse</title>
  <base href=".">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // 配置 Alpine.js 不使用 eval
    document.addEventListener('alpine:init', () => {
      // Alpine.js v3 默认不使用 eval，这是安全配置
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- 导航栏 -->
  <nav class="bg-white shadow-sm border-b" x-cloak>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="." class="flex items-center space-x-2">
            <span class="text-2xl">📚</span>
            <div class="flex flex-col">
              <span class="font-bold text-xl text-gray-900" x-text="t.siteName || 'ArxivPulse'">ArxivPulse</span>
              <span class="text-xs text-gray-500" x-text="t.siteTagline || '(only for RESET group)'">(only for RESET group)</span>
            </div>
          </a>
        </div>
        
        <div class="flex items-center space-x-4">
          <a href="." class="text-gray-600 hover:text-gray-900" x-text="t.backToHome || '返回首页'">返回首页</a>
          <button 
            x-show="isLoggedIn"
            @click="logout()"
            class="text-red-600 hover:text-red-700 font-medium"
            x-text="t.adminLogout || '登出'"
          >
            登出
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"
        x-data="adminApp()"
        x-init="init()">
    
    <!-- 登录表单 -->
    <div x-show="!isLoggedIn" x-cloak class="max-w-md mx-auto">
      <div class="bg-white rounded-lg shadow-sm border p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">管理员登录</h1>
        
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2" for="username" x-text="t.adminUsername || '用户名'">用户名</label>
            <input 
              type="text" 
              id="username"
              name="username"
              x-model="loginForm.username"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              :placeholder="t.adminUsername || '请输入用户名'"
              @keyup.enter="login()"
            >
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2" for="password" x-text="t.adminPassword || '密码'">密码</label>
            <input 
              type="password" 
              id="password"
              name="password"
              x-model="loginForm.password"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              :placeholder="t.adminPassword || '请输入密码'"
              @keyup.enter="login()"
            >
          </div>
          
          <button 
            @click="login()"
            :disabled="loggingIn"
            class="w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50"
          >
            <span x-show="!loggingIn" x-text="t.adminLoginBtn || '登录'">登录</span>
            <span x-show="loggingIn" x-text="t.adminLoggingIn || '登录中...'">登录中...</span>
          </button>
          
          <p x-show="error" class="text-red-600 text-sm text-center" x-text="error"></p>
        </div>
      </div>
    </div>

    <!-- 管理后台 -->
    <div x-show="isLoggedIn" x-cloak class="space-y-8">
      <!-- 统计卡片 -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="bg-white rounded-lg shadow-sm border p-6">
          <div class="text-sm text-gray-600 mb-2" x-text="t.adminStatsTotalPapers || '总论文数'">总论文数</div>
          <div class="text-3xl font-bold text-gray-900" x-text="(stats && stats.totalPapers !== undefined) ? stats.totalPapers : '-'"></div>
        </div>
        <div class="bg-white rounded-lg shadow-sm border p-6">
          <div class="text-sm text-gray-600 mb-2" x-text="t.adminStatsTotalTags || '标签数量'">标签数量</div>
          <div class="text-3xl font-bold text-gray-900" x-text="(stats && stats.totalTags !== undefined) ? stats.totalTags : '-'"></div>
        </div>
        <div class="bg-white rounded-lg shadow-sm border p-6">
          <div class="text-sm text-gray-600 mb-2" x-text="t.adminStatsPendingApps || '待审核申请'">待审核申请</div>
          <div class="text-3xl font-bold" :class="(stats && stats.pendingApplications > 0) ? 'text-red-600' : 'text-green-600'" x-text="(stats && stats.pendingApplications !== undefined) ? stats.pendingApplications : 0"></div>
        </div>
        <div class="bg-white rounded-lg shadow-sm border p-6">
          <div class="text-sm text-gray-600 mb-2" x-text="t.adminStatsRecentPapers || '近 7 天新增'">近 7 天新增</div>
          <div class="text-3xl font-bold text-gray-900" x-text="(stats && stats.recentPapers !== undefined) ? stats.recentPapers : '-'"></div>
        </div>
      </div>

      <!-- 标签管理面板 -->
      <div class="bg-white rounded-lg shadow-sm border">
        <div class="p-6 border-b">
          <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <h2 class="text-lg font-semibold" x-text="t.adminTagManageTitle || '标签管理'">标签管理</h2>
            <button 
              @click="showTagsPanel = !showTagsPanel"
              class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
            >
              <span x-text="showTagsPanel ? (t.currentLang === 'zh' ? '收起' : 'Collapse') : (t.adminTagManage || '管理标签')">管理标签</span>
            </button>
          </div>
        </div>
        
        <div x-show="showTagsPanel" x-cloak class="p-6">
          <!-- 添加新标签 -->
          <div class="mb-6 p-4 bg-gray-50 rounded-lg">
            <h3 class="text-sm font-medium text-gray-700 mb-3" x-text="t.adminTagManageTitle || '添加新标签'">添加新标签</h3>
            <div class="flex flex-col sm:flex-row gap-3">
              <input 
                type="text" 
                x-model="newTagName"
                :placeholder="t.adminTagName || '标签名称'"
                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              >
              <input 
                type="color" 
                x-model="newTagColor"
                class="w-12 h-10 border border-gray-300 rounded-lg cursor-pointer"
                :title="t.adminTagColor || '选择颜色'"
              >
              <button 
                @click="createTag()"
                class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors"
                x-text="t.adminTagAdd || '添加'"
              >
                添加
              </button>
            </div>
          </div>

          <!-- 标签列表 -->
          <div class="space-y-2">
            <div class="flex items-center gap-4 px-4 py-2 bg-gray-50 rounded-lg text-sm font-medium text-gray-700">
              <div class="w-24" x-text="t.adminTagColor || '颜色'">颜色</div>
              <div class="flex-1" x-text="t.adminTagName || '名称'">名称</div>
              <div class="w-32" x-text="t.currentLang === 'zh' ? '创建时间' : 'Created'">创建时间</div>
              <div class="w-24 text-center" x-text="t.adminAppAction || '操作'">操作</div>
            </div>
            
            <template x-for="tag in tags" :key="tag.id">
              <div class="flex items-center gap-4 px-4 py-3 border rounded-lg hover:bg-gray-50">
                <div class="w-24 flex items-center gap-2">
                  <div class="w-6 h-6 rounded" :style="`background-color: ${tag.color}`"></div>
                  <span class="text-xs text-gray-500" x-text="tag.color"></span>
                </div>
                <div class="flex-1">
                  <span class="font-medium" x-text="tag.name"></span>
                  <span x-show="!tag.is_approved" class="ml-2 px-2 py-0.5 text-xs bg-yellow-100 text-yellow-800 rounded" x-text="t.currentLang === 'zh' ? '待审核' : 'Pending'">待审核</span>
                </div>
                <div class="w-32 text-sm text-gray-500" x-text="formatDate(tag.created_at)"></div>
                <div class="w-24 flex justify-center gap-2">
                  <button 
                    @click="updateTag(tag.id)"
                    class="px-3 py-1 text-sm bg-blue-100 text-blue-700 rounded hover:bg-blue-200"
                    x-text="t.adminTagEdit || '编辑'"
                  >
                    编辑
                  </button>
                  <button 
                    @click="deleteTag(tag.id)"
                    class="px-3 py-1 text-sm bg-red-100 text-red-700 rounded hover:bg-red-200"
                    x-text="t.adminTagDelete || '删除'"
                  >
                    删除
                  </button>
                </div>
              </div>
            </template>
            
            <div x-show="tagsLoading" class="text-center py-4 text-gray-500" x-text="t.loading || '加载中...'">加载中...</div>
            <div x-show="!tagsLoading && tags.length === 0" class="text-center py-4 text-gray-500" x-text="t.noTags || '暂无标签'">暂无标签</div>
          </div>
        </div>
      </div>

      <!-- 标签申请审核 -->
      <div class="bg-white rounded-lg shadow-sm border">
        <div class="p-6 border-b">
          <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <h2 class="text-lg font-semibold">标签申请审核</h2>
            <div class="flex flex-wrap gap-2">
              <button 
                @click="loadApplications('all')"
                :class="appFilter === 'all' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
                class="px-3 py-1 rounded text-sm transition-colors"
              >
                全部
              </button>
              <button 
                @click="loadApplications('pending')"
                :class="appFilter === 'pending' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
                class="px-3 py-1 rounded text-sm transition-colors"
              >
                待审核
              </button>
              <button 
                @click="loadApplications('approved')"
                :class="appFilter === 'approved' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
                class="px-3 py-1 rounded text-sm transition-colors"
              >
                已通过
              </button>
              <button 
                @click="loadApplications('rejected')"
                :class="appFilter === 'rejected' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
                class="px-3 py-1 rounded text-sm transition-colors"
              >
                已拒绝
              </button>
            </div>
          </div>
        </div>
        
        <div class="p-6">
          <div x-show="applicationsLoading" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">加载中...</p>
          </div>

          <div x-show="!applicationsLoading && applications.length === 0" class="text-center py-12">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p class="mt-4 text-gray-600">暂无申请记录</p>
          </div>

          <div x-show="!applicationsLoading && applications.length > 0" class="space-y-4">
            <template x-for="app in applications" :key="app.id">
              <div class="border rounded-lg p-4 hover:shadow-md transition-shadow">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-3">
                  <div class="flex items-center space-x-3">
                    <span class="font-semibold text-lg" x-text="app.name"></span>
                    <span 
                      class="px-2 py-1 text-xs rounded-full font-medium"
                      :class="{
                        'bg-yellow-100 text-yellow-700': app.status === 'pending',
                        'bg-green-100 text-green-700': app.status === 'approved',
                        'bg-red-100 text-red-700': app.status === 'rejected'
                      }"
                      x-text="statusText(app.status)"
                    ></span>
                  </div>
                  <span class="text-sm text-gray-500" x-text="formatDate(app.created_at)"></span>
                </div>
                
                <div class="text-sm text-gray-600 mb-3">
                  <span>申请人 IP: </span>
                  <span class="font-mono text-xs" x-text="app.applicant_ip || '未知'"></span>
                </div>
                
                <div x-show="app.status === 'pending'" class="flex gap-2">
                  <button 
                    @click="reviewApplication(app.id, true)"
                    class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 text-sm font-medium transition-colors"
                  >
                    ✓ 通过
                  </button>
                  <button 
                    @click="reviewApplication(app.id, false)"
                    class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 text-sm font-medium transition-colors"
                  >
                    ✗ 拒绝
                  </button>
                </div>
                
                <div x-show="app.reviewed_at && app.reviewer_ip" class="text-sm text-gray-500 pt-2 border-t mt-2">
                  <div>审核时间：<span x-text="formatDate(app.reviewed_at)"></span></div>
                  <div>审核人 IP: <span class="font-mono text-xs" x-text="app.reviewer_ip"></span></div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    function adminApp() {
      return {
        isLoggedIn: false,
        loggingIn: false,
        error: '',
        loginForm: {
          username: '',
          password: ''
        },
        sessionId: null,
        stats: {
          totalPapers: 0,
          totalTags: 0,
          pendingApplications: 0,
          recentPapers: 0,
          lastUpdated: null
        },
        applications: [],
        applicationsLoading: false,
        appFilter: 'pending',
        tags: [],
        tagsLoading: false,
        showTagsPanel: false,
        editingTag: null,
        newTagName: '',
        newTagColor: '#3b82f6',

        async init() {
          // 确保 stats 对象已初始化
          if (!this.stats) {
            this.stats = {
              totalPapers: 0,
              totalTags: 0,
              pendingApplications: 0,
              recentPapers: 0,
              lastUpdated: null
            };
          }
          
          try {
            // 检查是否有保存的会话
            const savedSession = localStorage.getItem('arxiv-admin-session');
            if (savedSession) {
              this.sessionId = savedSession;
              // 验证会话是否仍然有效
              const response = await fetch('/arxiv-pulse/api/admin/stats', {
                headers: { 'x-session-id': this.sessionId }
              });
              if (response.ok) {
                this.isLoggedIn = true;
                await this.loadStats();
                await this.loadApplications('pending');
                await this.loadTags();
              } else {
                // 会话已过期，清除
                localStorage.removeItem('arxiv-admin-session');
                this.sessionId = null;
                this.isLoggedIn = false;
              }
            }
          } catch (error) {
            console.warn('Init error:', error.message);
            // 如果初始化失败，清除状态
            this.logout();
          }
        },

        async login() {
          if (!this.loginForm.username || !this.loginForm.password) {
            this.error = '请输入用户名和密码';
            return;
          }

          this.loggingIn = true;
          this.error = '';

          try {
            const response = await fetch('/arxiv-pulse/api/admin/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.loginForm)
            });

            const data = await response.json();

            if (response.ok) {
              this.sessionId = data.sessionId;
              this.isLoggedIn = true;
              localStorage.setItem('arxiv-admin-session', data.sessionId);
              
              await this.loadStats();
              await this.loadApplications('pending');
              await this.loadTags();
              
              this.loginForm.username = '';
              this.loginForm.password = '';
            } else {
              this.error = data.error || '登录失败';
            }
          } catch (error) {
            console.error('Login error:', error);
            this.error = '登录失败：' + error.message;
          } finally {
            this.loggingIn = false;
          }
        },

        async logout() {
          if (this.sessionId) {
            try {
              await fetch('/arxiv-pulse/api/admin/logout', {
                method: 'POST',
                headers: { 'x-session-id': this.sessionId }
              });
            } catch (e) {
              console.error('Logout error:', e);
            }
          }
          
          this.sessionId = null;
          this.isLoggedIn = false;
          localStorage.removeItem('arxiv-admin-session');
          // 重置 stats 为初始值，不是空对象
          this.stats = {
            totalPapers: 0,
            totalTags: 0,
            pendingApplications: 0,
            recentPapers: 0,
            lastUpdated: null
          };
          this.applications = [];
          this.loginForm.username = '';
          this.loginForm.password = '';
        },

        async loadStats() {
          try {
            const response = await fetch('/arxiv-pulse/api/admin/stats', {
              headers: { 'x-session-id': this.sessionId }
            });

            if (response.ok) {
              const data = await response.json();
              // 确保 stats 对象存在
              if (!this.stats) {
                this.stats = {
                  totalPapers: 0,
                  totalTags: 0,
                  pendingApplications: 0,
                  recentPapers: 0,
                  lastUpdated: null
                };
              }
              this.stats.totalPapers = data.totalPapers || 0;
              this.stats.totalTags = data.totalTags || 0;
              this.stats.pendingApplications = data.pendingApplications || 0;
              this.stats.recentPapers = data.recentPapers || 0;
              this.stats.lastUpdated = new Date().toISOString();
            } else {
              console.warn('Load stats failed:', response.status);
            }
          } catch (error) {
            console.warn('Load stats error:', error.message);
          }
        },

        async loadApplications(status) {
          this.appFilter = status;
          this.applicationsLoading = true;

          try {
            const url = `/arxiv-pulse/api/admin/applications?status=${encodeURIComponent(status)}`;
            const response = await fetch(url, {
              headers: { 'x-session-id': this.sessionId }
            });

            if (response.ok) {
              const data = await response.json();
              this.applications = data.applications || [];
            } else {
              console.warn('Load applications failed:', response.status);
              this.applications = [];
            }
          } catch (error) {
            console.warn('Load applications error:', error.message);
            this.applications = [];
          } finally {
            this.applicationsLoading = false;
          }
        },

        async reviewApplication(id, approved) {
          if (!confirm(`确定要${approved ? '通过' : '拒绝'}这个申请吗？`)) return;

          try {
            const response = await fetch(`/arxiv-pulse/api/admin/applications/${id}/review`, {
              method: 'POST',
              headers: { 
                'Content-Type': 'application/json',
                'x-session-id': this.sessionId 
              },
              body: JSON.stringify({ approved })
            });

            const data = await response.json();

            if (response.ok) {
              alert(data.message);
              await this.loadApplications(this.appFilter);
              await this.loadStats();
            } else {
              alert('操作失败：' + (data.error || '未知错误'));
            }
          } catch (error) {
            console.error('Failed to review application:', error);
            alert('操作失败：' + error.message);
          }
        },

        statusText(status) {
          const map = {
            'pending': '审核中',
            'approved': '已通过',
            'rejected': '已拒绝'
          };
          return map[status] || status;
        },

        formatDate(dateStr) {
          if (!dateStr) return '-';
          const date = new Date(dateStr);
          return date.toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
          });
        },

        async loadTags() {
          this.tagsLoading = true;
          try {
            const response = await fetch('/arxiv-pulse/api/tags-admin/tags', {
              headers: { 'x-session-id': this.sessionId }
            });
            if (response.ok) {
              const data = await response.json();
              this.tags = data.tags || [];
            }
          } catch (error) {
            console.warn('Load tags error:', error.message);
          } finally {
            this.tagsLoading = false;
          }
        },

        async createTag() {
          if (!this.newTagName.trim()) {
            alert('请输入标签名称');
            return;
          }

          try {
            const response = await fetch('/arxiv-pulse/api/tags-admin/tags', {
              method: 'POST',
              headers: { 
                'Content-Type': 'application/json',
                'x-session-id': this.sessionId 
              },
              body: JSON.stringify({ 
                name: this.newTagName.trim(), 
                color: this.newTagColor 
              })
            });

            const data = await response.json();
            if (response.ok) {
              alert('标签创建成功');
              this.newTagName = '';
              this.newTagColor = '#3b82f6';
              await this.loadTags();
              await this.loadStats();
            } else {
              alert('创建失败：' + (data.error || '未知错误'));
            }
          } catch (error) {
            console.error('Create tag error:', error);
            alert('创建失败：' + error.message);
          }
        },

        async updateTag(id) {
          const tag = this.tags.find(t => t.id === id);
          if (!tag) return;

          const newName = prompt('编辑标签名称:', tag.name);
          if (!newName || !newName.trim()) return;

          const newColor = prompt('编辑标签颜色 (hex):', tag.color);
          if (!newColor) return;

          try {
            const response = await fetch(`/arxiv-pulse/api/tags-admin/tags/${id}`, {
              method: 'PUT',
              headers: { 
                'Content-Type': 'application/json',
                'x-session-id': this.sessionId 
              },
              body: JSON.stringify({ 
                name: newName.trim(), 
                color: newColor 
              })
            });

            const data = await response.json();
            if (response.ok) {
              alert('标签更新成功');
              await this.loadTags();
              await this.loadStats();
            } else {
              alert('更新失败：' + (data.error || '未知错误'));
            }
          } catch (error) {
            console.error('Update tag error:', error);
            alert('更新失败：' + error.message);
          }
        },

        async deleteTag(id) {
          const tag = this.tags.find(t => t.id === id);
          if (!tag) return;

          if (!confirm(`确定要删除标签 "${tag.name}" 吗？`)) return;

          try {
            const response = await fetch(`/arxiv-pulse/api/tags-admin/tags/${id}`, {
              method: 'DELETE',
              headers: { 'x-session-id': this.sessionId }
            });

            const data = await response.json();
            if (response.ok) {
              alert('标签删除成功');
              await this.loadTags();
              await this.loadStats();
            } else {
              alert('删除失败：' + (data.error || '未知错误'));
            }
          } catch (error) {
            console.error('Delete tag error:', error);
            alert('删除失败：' + error.message);
          }
        },
      }
    }
  </script>
</body>
</html>
