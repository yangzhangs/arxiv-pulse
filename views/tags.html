<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标签管理 - ArxivPulse</title>
  <base href="/arxiv-pulse/">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- 导航栏 -->
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="." class="flex items-center space-x-2">
            <span class="text-2xl">📚</span>
            <div class="flex flex-col">
              <span class="font-bold text-xl text-gray-900">ArxivPulse</span>
              <span class="text-xs text-gray-500">(only for RESET group)</span>
            </div>
          </a>
        </div>
        
        <div class="hidden md:flex items-center space-x-8">
          <a href="." class="text-gray-600 hover:text-gray-900">首页</a>
          <a href="tags" class="text-blue-600 font-medium">标签</a>
          <a href="about" class="text-gray-600 hover:text-gray-900">关于</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"
        x-data="tagsApp()"
        x-init="init()">
    
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">标签管理</h1>
      <p class="text-gray-600">管理和筛选学术文章标签</p>
    </div>

    <!-- 申请新标签 -->
    <div class="bg-white rounded-lg shadow-sm border p-6 mb-8">
      <h2 class="text-lg font-semibold mb-4">申请添加你感兴趣的标签</h2>
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
        <p class="text-sm text-blue-700">
          💡 提交标签申请后，需要管理员审核通过才能添加到标签列表。请确保标签与 Software Engineering 领域相关。
        </p>
      </div>
      <div class="flex flex-col sm:flex-row gap-4">
        <input 
          type="text" 
          x-model="newTagName"
          placeholder="标签名称（如：Machine Learning）"
          class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          @keyup.enter="applyTag()"
        >
        <button 
          @click="applyTag()"
          :disabled="submitting"
          class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span x-show="!submitting">提交申请</span>
          <span x-show="submitting">提交中...</span>
        </button>
      </div>
    </div>

    <!-- 已通过的标签列表 -->
    <div class="bg-white rounded-lg shadow-sm border mb-8">
      <div class="p-6 border-b">
        <h2 class="text-lg font-semibold">所有标签 (<span x-text="tags.length"></span>)</h2>
      </div>
      
      <div class="p-6">
        <div x-show="loading" class="text-center py-8">
          <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        </div>

        <div x-show="!loading" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
          <template x-for="tag in tags" :key="tag.id">
            <div class="flex items-center justify-between p-4 border rounded-lg hover:shadow-md transition-shadow">
              <div class="flex items-center space-x-3">
                <div class="flex items-center space-x-2">
    <div class="flex items-center space-x-2">
    <span class="font-medium px-3 py-1 bg-blue-100 text-blue-700 rounded-full" x-text="tag.name"></span>
    <span class="text-xs text-gray-500" x-text="'(' + (tag.paper_count || 0) + ')'"></span>
  </div>
    <span class="text-xs text-gray-500" x-text="'(' + (tag.paper_count || 0) + ')'"></span>
  </div>
              </div>
              <div class="flex items-center space-x-2">
                <a 
                  :href="'./?tag=' + tag.name"
                  class="text-sm text-blue-600 hover:underline"
                >
                  查看
                </a>
              </div>
            </div>
          </template>
        </div>

        <div x-show="!loading && tags.length === 0" class="text-center py-8 text-gray-600">
          暂无标签
        </div>
      </div>
    </div>

    <!-- 我的申请记录 -->
    <div class="bg-white rounded-lg shadow-sm border" x-show="applications.length > 0">
      <div class="p-6 border-b">
        <h2 class="text-lg font-semibold">我的申请记录</h2>
      </div>
      
      <div class="p-6">
        <div class="space-y-3">
          <template x-for="app in applications" :key="app.id">
            <div class="flex items-center justify-between p-4 border rounded-lg">
              <div class="flex items-center space-x-3">
                <span class="font-medium" x-text="app.name"></span>
                <span 
                  class="px-2 py-1 text-xs rounded-full"
                  :class="{
                    'bg-yellow-100 text-yellow-700': app.status === 'pending',
                    'bg-green-100 text-green-700': app.status === 'approved',
                    'bg-red-100 text-red-700': app.status === 'rejected'
                  }"
                  x-text="statusText(app.status)"
                ></span>
              </div>
              <span class="text-sm text-gray-500" x-text="formatDate(app.created_at)"></span>
            </div>
          </template>
        </div>
      </div>
    </div>
  </main>

  <script>
    function tagsApp() {
      return {
        tags: [],
        applications: [],
        loading: false,
        submitting: false,
        newTagName: '',

        async init() {
          await this.loadTags();
          this.loadApplications();
        },

        async loadTags() {
          this.loading = true;
          try {
            const response = await fetch('api/tags?approved=true');
            const data = await response.json();
            this.tags = data.tags || [];
          } catch (error) {
            console.error('Failed to load tags:', error);
          } finally {
            this.loading = false;
          }
        },

        loadApplications() {
          // 从 localStorage 加载申请记录
          const saved = localStorage.getItem('arxiv-tag-applications');
          if (saved) {
            this.applications = JSON.parse(saved);
          }
        },

        saveApplication(app) {
          this.applications.unshift(app);
          localStorage.setItem('arxiv-tag-applications', JSON.stringify(this.applications));
        },

        async applyTag() {
          if (!this.newTagName.trim()) {
            alert('请输入标签名称');
            return;
          }

          this.submitting = true;
          try {
            const response = await fetch('api/tags/apply', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: this.newTagName.trim()
              })
            });

            const data = await response.json();

            if (response.ok) {
              // 保存申请记录
              this.saveApplication({
                id: data.applicationId,
                name: this.newTagName.trim(),
                status: 'pending',
                created_at: new Date().toISOString()
              });
              
              this.newTagName = '';
              alert('标签申请已提交，等待管理员审核！');
            } else {
              alert('申请失败：' + (data.error || '未知错误'));
            }
          } catch (error) {
            console.error('Failed to apply tag:', error);
            alert('申请失败：' + error.message);
          } finally {
            this.submitting = false;
          }
        },

        statusText(status) {
          const map = {
            'pending': '审核中',
            'approved': '已通过',
            'rejected': '已拒绝'
          };
          return map[status] || status;
        },

        formatDate(dateStr) {
          const date = new Date(dateStr);
          return date.toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
          });
        }
      }
    }
  </script>
</body>
</html>
