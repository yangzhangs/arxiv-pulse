<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标签管理 - ArxivPulse</title>
  <base href=".">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- 导航栏 -->
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="." class="flex items-center space-x-2">
            <span class="text-2xl">📚</span>
            <div class="flex flex-col">
              <span class="font-bold text-xl text-gray-900">ArxivPulse</span>
              <span class="text-xs text-gray-500">(only for RESET group)</span>
            </div>
          </a>
        </div>
        
        <div class="hidden md:flex items-center space-x-8">
          <a href="." class="text-gray-600 hover:text-gray-900">首页</a>
          <a href="tags" class="text-blue-600 font-medium">标签</a>
          <a href="about" class="text-gray-600 hover:text-gray-900">关于</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"
        x-data="tagsApp()"
        x-init="init()">
    
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">标签管理</h1>
      <p class="text-gray-600">管理和筛选学术文章标签</p>
    </div>

    <!-- 已通过的标签列表 -->
    <div class="bg-white rounded-lg shadow-sm border mb-8">
      <div class="p-6 border-b">
        <h2 class="text-lg font-semibold">所有标签 (<span x-text="tags.length"></span>)</h2>
      </div>
      
      <div class="p-6">
        <div x-show="loading" class="text-center py-8">
          <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        </div>

        <div x-show="!loading" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
          <template x-for="tag in tags" :key="tag.id">
            <div class="flex items-center justify-between p-4 border rounded-lg hover:shadow-md transition-shadow">
              <div class="flex items-center space-x-2">
                <span class="font-medium px-3 py-1 bg-blue-100 text-blue-700 rounded-full" x-text="tag.name"></span>
                <span class="text-xs text-gray-500" x-text="'(' + (tag.paper_count || 0) + ')'"></span>
              </div>
              <div class="flex items-center space-x-2">
                <a 
                  :href="'./?tag=' + tag.name"
                  class="text-sm text-blue-600 hover:underline"
                >
                  查看
                </a>
              </div>
            </div>
          </template>
        </div>

        <div x-show="!loading && tags.length === 0" class="text-center py-8 text-gray-600">
          暂无标签
        </div>
      </div>
    </div>
  </main>

  <script>
    function tagsApp() {
      return {
        tags: [],
        loading: false,

        async init() {
          await this.loadTags();
        },

        async loadTags() {
          this.loading = true;
          try {
            const response = await fetch('api/tags?with_counts=true');
            const data = await response.json();
            this.tags = data.tags || [];
          } catch (error) {
            console.error('Failed to load tags:', error);
          } finally {
            this.loading = false;
          }
        },


      }
    }
  </script>
</body>
</html>
