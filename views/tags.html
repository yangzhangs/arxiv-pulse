<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title x-text="t.tagsTitle || 'Tags'">标签管理 - ArxivPulse</title>
  <base href=".">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- 导航栏 -->
  <nav class="bg-white shadow-sm border-b" x-data="{ currentLang: getCurrentLang(), t: {} }" x-init="loadTranslations(currentLang).then(translations => t = translations)">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="." class="flex items-center space-x-2">
            <span class="text-2xl">📚</span>
            <div class="flex flex-col">
              <span class="font-bold text-xl text-gray-900" x-text="t.siteName || 'ArxivPulse'">ArxivPulse</span>
              <span class="text-xs text-gray-500" x-text="t.siteTagline || '(only for RESET group)'">(only for RESET group)</span>
            </div>
          </a>
        </div>
        
        <div class="hidden md:flex items-center space-x-8">
          <a href="." class="text-gray-600 hover:text-gray-900" x-text="t.navHome || 'Home'">首页</a>
          <a href="tags" class="text-blue-600 font-medium" x-text="t.navTags || 'Tags'">标签</a>
          <a href="about" class="text-gray-600 hover:text-gray-900" x-text="t.navAbout || 'About'">关于</a>
          
          <!-- 语言切换 -->
          <div class="flex items-center border-l pl-4" x-data="{ lang: currentLang }">
            <button @click="switchLang(lang === 'zh' ? 'en' : 'zh')" 
              class="flex items-center space-x-2 px-3 py-1.5 rounded-lg border hover:border-blue-300 hover:bg-blue-50 transition-all"
              :class="lang === 'zh' ? 'bg-blue-100 border-blue-200' : 'bg-gray-50 border-gray-200'"
              :title="lang === 'zh' ? 'Switch to English' : '切换到中文'">
              <span x-show="lang === 'zh'" class="text-sm">🌏 EN</span>
              <span x-show="lang === 'en'" class="text-sm">🌐 中文</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"
        x-data="tagsApp()"
        x-init="init()">
    
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2" x-text="t.tagsTitle || 'Tags'">标签管理</h1>
      <p class="text-gray-600" x-text="t.tagsSubtitle || 'Manage and filter paper tags'">管理和筛选学术文章标签</p>
    </div>

    <!-- 申请新标签 -->
    <div class="bg-white rounded-lg shadow-sm border p-6 mb-8">
      <h2 class="text-lg font-semibold mb-4" x-text="t.applyTagTitle || 'Request a New Tag'">申请添加你感兴趣的标签</h2>
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
        <p class="text-sm text-blue-700" x-text="t.applyTagTip || '💡 After submitting a tag request, it needs admin approval before being added. Please ensure the tag is related to Software Engineering.'">
          💡 提交标签申请后，需要管理员审核通过才能添加到标签列表。请确保标签与 Software Engineering 领域相关。
        </p>
      </div>
      <div class="flex flex-col sm:flex-row gap-4">
        <input 
          type="text" 
          x-model="newTagName"
          :placeholder="t.applyTagPlaceholder || 'Tag name (e.g., Machine Learning)'"
          class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          @keyup.enter="applyTag()"
        >
        <button 
          @click="applyTag()"
          :disabled="submitting"
          class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span x-show="!submitting" x-text="t.applyTagSubmit || 'Submit'">提交申请</span>
          <span x-show="submitting" x-text="t.applying || 'Submitting...'">提交中...</span>
        </button>
      </div>
    </div>

    <!-- 已通过的标签列表 -->
    <div class="bg-white rounded-lg shadow-sm border mb-8">
      <div class="p-6 border-b">
        <h2 class="text-lg font-semibold">
          <span x-show="currentLang === 'zh'" x-text="(t.allTagsList || '所有标签') + ' (' + tags.length + ')'">所有标签</span>
          <span x-show="currentLang === 'en'">All Tags (<span x-text="tags.length"></span>)</span>
        </h2>
      </div>
      
      <div class="p-6">
        <div x-show="loading" class="text-center py-8">
          <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        </div>

        <div x-show="!loading" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
          <template x-for="tag in tags" :key="tag.id">
            <div class="flex items-center justify-between p-4 border rounded-lg hover:shadow-md transition-shadow">
              <div class="flex items-center space-x-2">
                <span class="font-medium px-3 py-1 bg-blue-100 text-blue-700 rounded-full" x-text="tag.name"></span>
                <span class="text-xs text-gray-500">(<span x-text="tag.paper_count || 0"></span>)</span>
              </div>
              <div class="flex items-center space-x-2">
                <a 
                  :href="'./?tag=' + tag.name"
                  class="text-sm text-blue-600 hover:underline"
                  x-text="currentLang === 'zh' ? (t.view || '查看') : (t.view || 'View')"
                >
                  查看
                </a>
              </div>
            </div>
          </template>
        </div>

        <div x-show="!loading && tags.length === 0" class="text-center py-8 text-gray-600">
          <span x-show="currentLang === 'zh'" x-text="t.noTags || '暂无标签'">暂无标签</span>
          <span x-show="currentLang === 'en'" x-text="t.noTags || 'No tags'">No tags</span>
        </div>
      </div>
    </div>
  </main>

  <script>
    function tagsApp() {
      return {
        tags: [],
        loading: false,
        submitting: false,
        newTagName: '',
        currentLang: getCurrentLang(),
        t: {},

        async init() {
          try {
            this.t = await loadTranslations(this.currentLang);
          } catch (e) {
            console.error('Failed to load translations:', e);
            this.t = {};
          }
          await this.loadTags();
        },

        async loadTags() {
          this.loading = true;
          try {
            const response = await fetch('api/tags?with_counts=true');
            const data = await response.json();
            this.tags = data.tags || [];
          } catch (error) {
            console.error('Failed to load tags:', error);
          } finally {
            this.loading = false;
          }
        },

        async applyTag() {
          if (!this.newTagName.trim()) {
            const msg = this.currentLang === 'en' ? 'Please enter a tag name' : '请输入标签名称';
            alert(msg);
            return;
          }

          this.submitting = true;
          try {
            const response = await fetch('api/tags/apply', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: this.newTagName.trim()
              })
            });

            const data = await response.json();

            if (response.ok) {
              this.newTagName = '';
              const successMsg = this.currentLang === 'en' 
                ? 'Tag request submitted, waiting for admin review!' 
                : '标签申请已提交，等待管理员审核！';
              alert(successMsg);
            } else {
              const errorMsg = this.currentLang === 'en'
                ? 'Application failed: ' + (data.error || 'Unknown error')
                : '申请失败：' + (data.error || '未知错误');
              alert(errorMsg);
            }
          } catch (error) {
            console.error('Failed to apply tag:', error);
            const errorMsg = this.currentLang === 'en'
              ? 'Application failed: ' + error.message
              : '申请失败：' + error.message;
            alert(errorMsg);
          } finally {
            this.submitting = false;
          }
        }
      }
    }
  </script>
</body>
</html>
