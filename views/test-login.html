<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Admin 登录测试</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 100px auto; padding: 20px; }
    input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    #result { margin-top: 20px; padding: 10px; border-radius: 5px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h2>Admin 登录测试</h2>
  <input type="text" id="username" placeholder="用户名" value="admin">
  <input type="password" id="password" placeholder="密码" value="admin123">
  <button onclick="login()">登录</button>
  <div id="result"></div>

  <script>
    async function login() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '登录中...';
      resultDiv.className = '';
      
      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          resultDiv.innerHTML = '✅ 登录成功！<br>Session: ' + data.sessionId;
          resultDiv.className = 'success';
        } else {
          resultDiv.innerHTML = '❌ 登录失败：<br>' + (data.error || '未知错误');
          resultDiv.className = 'error';
        }
      } catch (error) {
        resultDiv.innerHTML = '❌ 请求失败：<br>' + error.message;
        resultDiv.className = 'error';
      }
    }
  </script>
</body>
</html>
