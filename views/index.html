<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArxivPulse - 学术文章检索</title>
  <base href="/arxiv-papers/">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- 导航栏 -->
  <nav class="bg-white shadow-sm border-b" x-data="{ mobileMenuOpen: false }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="/" class="flex items-center space-x-2">
            <span class="text-2xl">📚</span>
            <span class="font-bold text-xl text-gray-900">ArxivPulse</span>
          </a>
        </div>
        
        <!-- 桌面导航 -->
        <div class="hidden md:flex items-center space-x-8">
          <a href="/" class="text-blue-600 font-medium">首页</a>
          <a href="/tags" class="text-gray-600 hover:text-gray-900">标签</a>
          <a href="/about" class="text-gray-600 hover:text-gray-900">关于</a>
        </div>

        <!-- 移动端菜单按钮 -->
        <div class="md:hidden flex items-center">
          <button @click="mobileMenuOpen = !mobileMenuOpen" class="text-gray-600 hover:text-gray-900">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- 移动端菜单 -->
    <div x-show="mobileMenuOpen" class="md:hidden bg-white border-t">
      <div class="px-4 py-2 space-y-2">
        <a href="/" class="block py-2 text-blue-600 font-medium">首页</a>
        <a href="/tags" class="block py-2 text-gray-600">标签</a>
        <a href="/about" class="block py-2 text-gray-600">关于</a>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"
        x-data="paperApp()"
        x-init="init()">
    
    <!-- 搜索栏 -->
    <div class="mb-8">
      <div class="flex flex-col sm:flex-row gap-4">
        <div class="flex-1 relative">
          <input 
            type="text" 
            x-model="searchQuery"
            @input.debounce.300ms="search()"
            placeholder="搜索标题、作者、摘要..."
            class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          >
          <svg class="absolute left-3 top-3.5 h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
        <div class="flex gap-2">
          <select 
            x-model="selectedTag"
            @change="filterByTag()"
            class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          >
            <option value="">所有标签</option>
            <template x-for="tag in tags" :key="tag.id">
              <option :value="tag.name" x-text="tag.name"></option>
            </template>
          </select>
        </div>
      </div>
    </div>

    <!-- 统计信息 -->
    <div class="mb-6 flex items-center justify-between">
      <p class="text-gray-600">
        共 <span class="font-semibold text-gray-900" x-text="pagination.total"></span> 篇文章
        <span x-show="selectedTag" class="ml-2 text-blue-600">
          · 标签：<span x-text="selectedTag"></span>
        </span>
      </p>
      <div class="flex items-center space-x-2">
        <button 
          @click="currentPage--" 
          :disabled="currentPage <= 1"
          class="px-3 py-1 border rounded disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50"
        >
          上一页
        </button>
        <span class="text-gray-600">
          第 <span x-text="currentPage"></span> / <span x-text="pagination.totalPages || 1"></span> 页
        </span>
        <button 
          @click="currentPage++" 
          :disabled="currentPage >= pagination.totalPages"
          class="px-3 py-1 border rounded disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50"
        >
          下一页
        </button>
      </div>
    </div>

    <!-- 加载状态 -->
    <div x-show="loading" class="text-center py-12">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
      <p class="mt-4 text-gray-600">加载中...</p>
    </div>

    <!-- 论文列表 -->
    <div x-show="!loading" class="space-y-4">
      <template x-for="paper in papers" :key="paper.id">
        <div class="bg-white rounded-lg shadow-sm border p-6 hover:shadow-md transition-shadow">
          <div class="flex items-start justify-between">
            <div class="flex-1">
              <h3 class="text-lg font-semibold text-gray-900 mb-2">
                <a :href="paper.arxiv_url" target="_blank" class="hover:text-blue-600" x-text="paper.title"></a>
              </h3>
              <p class="text-sm text-gray-600 mb-3" x-text="paper.authors"></p>
              <p class="text-gray-700 text-sm mb-4 line-clamp-3" x-text="paper.abstract"></p>
              
              <!-- 标签 -->
              <div class="flex flex-wrap gap-2 mb-3">
                <template x-if="paper.tags">
                  <template x-for="tag in paper.tags.split(',')" :key="tag">
                    <span 
                      class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full cursor-pointer hover:bg-blue-200"
                      @click="selectedTag = tag; filterByTag()"
                      x-text="tag"
                    ></span>
                  </template>
                </template>
              </div>
              
              <div class="flex items-center gap-4 text-sm text-gray-500">
                <span>📅 <span x-text="formatDate(paper.published_date)"></span></span>
                <a :href="paper.pdf_url" target="_blank" class="text-blue-600 hover:underline flex items-center gap-1">
                  📄 PDF
                </a>
                <a :href="paper.arxiv_url" target="_blank" class="text-blue-600 hover:underline flex items-center gap-1">
                  🔗 Arxiv
                </a>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- 空状态 -->
      <div x-show="papers.length === 0" class="text-center py-12">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p class="mt-4 text-gray-600">暂无文章</p>
      </div>
    </div>

    <!-- 分页 -->
    <div x-show="!loading && papers.length > 0" class="mt-8 flex justify-center">
      <div class="flex items-center space-x-2">
        <button 
          @click="currentPage--" 
          :disabled="currentPage <= 1"
          class="px-4 py-2 border rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50"
        >
          ← 上一页
        </button>
        <template x-for="page in totalPagesArray" :key="page">
          <button 
            @click="currentPage = page"
            :class="currentPage === page ? 'bg-blue-600 text-white' : 'bg-white text-gray-700'"
            class="px-4 py-2 border rounded-lg hover:bg-gray-50"
            x-text="page"
          ></button>
        </template>
        <button 
          @click="currentPage++" 
          :disabled="currentPage >= pagination.totalPages"
          class="px-4 py-2 border rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50"
        >
          下一页 →
        </button>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="bg-white border-t mt-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div class="flex items-center space-x-2 mb-4 md:mb-0">
          <span class="text-2xl">📚</span>
          <span class="font-bold text-gray-900">ArxivPulse</span>
        </div>
        <p class="text-gray-600 text-sm">
          Powered by <a href="https://arxiv.org" target="_blank" class="text-blue-600 hover:underline">arXiv.org</a>
        </p>
      </div>
    </div>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
